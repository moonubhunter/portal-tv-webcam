<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
  img { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>
  <!-- Poll the latest JPEG in a load-chained loop. Plain JPEGs always render in
       CEF/Chromium, sidestepping multipart/x-mixed-replace quirks. Each request
       returns PortalCam's latest frame over the USB tunnel. -->
  <img id="v" alt="">
  <script>
    var v = document.getElementById('v');
    var base = 'http://127.0.0.1:8088/shot.jpg';
    function next() { v.src = base + '?t=' + performance.now(); }
    v.onload = next;
    v.onerror = function () { setTimeout(next, 250); };
    next();
  </script>
</body>
</html>
